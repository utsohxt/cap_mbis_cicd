_schema-version: "3.3.0"
ID: cap_mbis_cicd
version: 1.0.0
description: CAP MBIS CI/CD Equipment App

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:

  # ── CAP Node.js Backend ──────────────────────────────────────────────────
  - name: cap_mbis_cicd-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    properties:
      EXIT: 1
    requires:
      - name: cap_mbis_cicd-db
      - name: cap_mbis_cicd-auth
      - name: cap_mbis_cicd-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── Database Deployer ────────────────────────────────────────────────────
  - name: cap_mbis_cicd-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cap_mbis_cicd-db

  # ── Fiori / HTML5 App ────────────────────────────────────────────────────
  - name: cap_mbis_cicd-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: cap_mbis_cicd-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: cap_mbis_cicd-equipment
          artifacts:
            - equipment.zip
          target-path: app/

  - name: cap_mbis_cicd-equipment
    type: html5
    path: app/equipment
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  # ── Launchpad / Destination Content ─────────────────────────────────────
  - name: cap_mbis_cicd-destination-content
    type: com.sap.application.content
    requires:
      - name: cap_mbis_cicd-destination
        parameters:
          content-target: true
      - name: cap_mbis_cicd-repo-host
        parameters:
          service-key:
            name: cap_mbis_cicd-repo-host-key
      - name: cap_mbis_cicd-auth
        parameters:
          service-key:
            name: cap_mbis_cicd-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: cap_mbis_cicd_repo_host
              ServiceInstanceName: cap_mbis_cicd-repo-host
              ServiceKeyName: cap_mbis_cicd-repo-host-key
              sap.cloud.service: cap.mbis.cicd
            - Name: cap_mbis_cicd_auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: cap_mbis_cicd-auth
              ServiceKeyName: cap_mbis_cicd-auth-key
              sap.cloud.service: cap.mbis.cicd
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

resources:

  # ── HANA Cloud ───────────────────────────────────────────────────────────
  - name: cap_mbis_cicd-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ── XSUAA ────────────────────────────────────────────────────────────────
  - name: cap_mbis_cicd-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cap-mbis-cicd-${org}-${space}
        tenant-mode: dedicated

  # ── Destination Service ──────────────────────────────────────────────────
  - name: cap_mbis_cicd-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        destinations:
          - Name: APD300
            Description: S/4HANA Backend APD300
            Type: HTTP
            Authentication: BasicAuthentication
            ProxyType: OnPremise
            URL: http://apd300
            HTML5.DynamicDestination: true
          - Name: cap_mbis_cicd-srv-api
            Description: CAP Backend Service
            Type: HTTP
            Authentication: NoAuthentication
            URL: ~{srv-api/srv-url}
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
    requires:
      - name: srv-api

  # ── HTML5 Repo Host ──────────────────────────────────────────────────────
  - name: cap_mbis_cicd-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
